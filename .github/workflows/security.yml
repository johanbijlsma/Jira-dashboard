name: Security

on:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secrets-scan:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks

      - name: Run gitleaks (working tree)
        run: ./gitleaks dir . --config .gitleaks.toml --redact --exit-code 1

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: python -m pip install --upgrade pip semgrep

      - name: Run Semgrep
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          BASELINE_ARG=""
          if [ -n "${BASE_SHA}" ]; then
            BASELINE_ARG="--baseline-commit ${BASE_SHA}"
          fi
          semgrep scan \
            --config auto \
            --config p/owasp-top-ten \
            --exclude dashboard/coverage \
            --exclude dashboard/.next \
            --exclude dashboard/node_modules \
            --exclude dashboard/test-results \
            ${BASELINE_ARG} \
            --json \
            --output semgrep-results.json \
            . || true

      - name: Fail on new high severity findings
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import subprocess
          import sys

          with open("semgrep-results.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          results = data.get("results", [])
          if not results:
              print("No Semgrep findings.")
              sys.exit(0)

          def changed_line_ranges(base_sha: str):
              if not base_sha:
                  return {}
              try:
                  diff_text = subprocess.check_output(
                      ["git", "diff", "--unified=0", f"{base_sha}...HEAD"],
                      text=True,
                  )
              except subprocess.CalledProcessError as exc:
                  print(f"Could not load git diff against {base_sha}: {exc}. Falling back to all findings.")
                  return {}

              file_ranges = {}
              current_file = None
              for line in diff_text.splitlines():
                  if line.startswith("+++ b/"):
                      current_file = line[6:]
                      file_ranges.setdefault(current_file, [])
                      continue
                  if not line.startswith("@@") or current_file is None:
                      continue
                  match = re.search(r"\+(\d+)(?:,(\d+))?", line)
                  if not match:
                      continue
                  start = int(match.group(1))
                  length = int(match.group(2) or "1")
                  if length <= 0:
                      continue
                  file_ranges[current_file].append((start, start + length - 1))
              return file_ranges

          def is_new_finding(item, changed_ranges):
              if not changed_ranges:
                  return True
              path = item.get("path")
              if not path or path not in changed_ranges:
                  return False
              start = ((item.get("start") or {}).get("line")) or ((item.get("extra") or {}).get("lines")) or 0
              try:
                  start = int(start)
              except Exception:
                  start = 0
              if start <= 0:
                  return False
              return any(lo <= start <= hi for lo, hi in changed_ranges[path])

          changed_ranges = changed_line_ranges(os.environ.get("BASE_SHA", "").strip())
          scoped_results = [item for item in results if is_new_finding(item, changed_ranges)]
          if changed_ranges and not scoped_results:
              print("Semgrep findings exist, but none land on lines changed by this PR. Passing.")
              sys.exit(0)

          high_levels = {"HIGH", "CRITICAL", "ERROR"}
          severities = []
          for item in scoped_results:
              extra = item.get("extra", {}) if isinstance(item, dict) else {}
              severity = str(extra.get("severity", "")).upper()
              if severity:
                  severities.append(severity)

          if severities:
              high = [s for s in severities if s in high_levels]
              if high:
                  print(
                      f"Semgrep found {len(scoped_results)} findings on PR-changed lines; "
                      f"{len(high)} are high/critical/error. Failing."
                  )
                  sys.exit(1)
              print(f"Semgrep found {len(scoped_results)} findings on PR-changed lines; none are high/critical/error. Passing.")
              sys.exit(0)

          print("Semgrep findings on PR-changed lines do not include severity metadata; failing on any findings.")
          sys.exit(1)
          PY

  dependency-scan:
    name: Dependency scan (Node + Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Clean install Node dependencies
        working-directory: dashboard
        run: npm ci

      - name: Run npm audit
        working-directory: dashboard
        run: npm audit --audit-level=high

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies and pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt pip-audit

      - name: Run pip-audit
        run: pip-audit -r requirements.txt -r requirements-dev.txt --format json --output pip-audit-results.json || true

      - name: Fail on fixable Python vulnerabilities
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys

          with open("pip-audit-results.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          findings = data if isinstance(data, list) else data.get("dependencies", [])
          total_vulns = 0
          fixable_vulns = 0

          for dep in findings:
              for vuln in dep.get("vulns", []):
                  total_vulns += 1
                  if vuln.get("fix_versions"):
                      fixable_vulns += 1

          if total_vulns == 0:
              print("No Python vulnerabilities found by pip-audit.")
              sys.exit(0)

          base_sha = os.environ.get("BASE_SHA", "").strip()
          if base_sha:
              diff = subprocess.check_output(
                  ["git", "diff", "--name-only", base_sha, "HEAD"],
                  text=True,
              ).splitlines()
              dep_files = {
                  "requirements.txt",
                  "requirements-dev.txt",
                  "dashboard/package.json",
                  "dashboard/package-lock.json",
              }
              if not any(path in dep_files for path in diff):
                  print(
                      f"pip-audit found {total_vulns} vulnerabilities ({fixable_vulns} fixable), "
                      "but this PR does not modify dependency manifest/lock files. Passing."
                  )
                  sys.exit(0)

          if fixable_vulns > 0:
              print(f"pip-audit found {total_vulns} vulnerabilities; {fixable_vulns} have available fixes. Failing.")
              sys.exit(1)

          print(f"pip-audit found {total_vulns} vulnerabilities, but none have a published fix version yet. Passing.")
          sys.exit(0)
          PY
