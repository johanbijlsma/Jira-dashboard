name: Security

on:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secrets-scan:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks

      - name: Run gitleaks (working tree)
        run: ./gitleaks dir . --config .gitleaks.toml --redact --exit-code 1

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: python -m pip install --upgrade pip semgrep==1.136.0

      - name: Run Semgrep
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          TARGETS=(
            api.py
            import_issues.py
            dashboard/components
            dashboard/lib
            dashboard/pages
          )
          echo "Semgrep scan scope:"
          printf ' - %s\n' "${TARGETS[@]}"

          BASELINE_ARG=()
          if [ -n "${BASE_SHA}" ]; then
            BASELINE_ARG=(--baseline-commit "${BASE_SHA}")
            echo "Using PR baseline commit: ${BASE_SHA}"
          else
            echo "No PR baseline commit provided; evaluating the full configured Semgrep scope."
          fi
          semgrep scan \
            --config auto \
            --config p/owasp-top-ten \
            --exclude dashboard/coverage \
            --exclude dashboard/.next \
            --exclude dashboard/node_modules \
            --exclude dashboard/test-results \
            --exclude dashboard/tests \
            --exclude dashboard/e2e \
            "${BASELINE_ARG[@]}" \
            --json \
            --output semgrep-results.json \
            "${TARGETS[@]}" || true
          if [ ! -f semgrep-results.json ]; then
            printf '{"results":[]}\n' > semgrep-results.json
          fi

      - name: Fail on new high severity findings
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: python scripts/filter_semgrep_results.py

  dependency-scan:
    name: Dependency scan (Node + Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Clean install Node dependencies
        working-directory: dashboard
        run: npm ci

      - name: Run npm audit
        working-directory: dashboard
        run: npm audit --audit-level=high

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies and pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt pip-audit

      - name: Run pip-audit
        run: pip-audit -r requirements.txt -r requirements-dev.txt --format json --output pip-audit-results.json || true

      - name: Fail on fixable Python vulnerabilities
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys

          with open("pip-audit-results.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          findings = data if isinstance(data, list) else data.get("dependencies", [])
          total_vulns = 0
          fixable_vulns = 0

          for dep in findings:
              for vuln in dep.get("vulns", []):
                  total_vulns += 1
                  if vuln.get("fix_versions"):
                      fixable_vulns += 1

          if total_vulns == 0:
              print("No Python vulnerabilities found by pip-audit.")
              sys.exit(0)

          base_sha = os.environ.get("BASE_SHA", "").strip()
          if base_sha:
              diff = subprocess.check_output(
                  ["git", "diff", "--name-only", base_sha, "HEAD"],
                  text=True,
              ).splitlines()
              dep_files = {
                  "requirements.txt",
                  "requirements-dev.txt",
                  "dashboard/package.json",
                  "dashboard/package-lock.json",
              }
              if not any(path in dep_files for path in diff):
                  print(
                      f"pip-audit found {total_vulns} vulnerabilities ({fixable_vulns} fixable), "
                      "but this PR does not modify dependency manifest/lock files. Passing."
                  )
                  sys.exit(0)

          if fixable_vulns > 0:
              print(f"pip-audit found {total_vulns} vulnerabilities; {fixable_vulns} have available fixes. Failing.")
              sys.exit(1)

          print(f"pip-audit found {total_vulns} vulnerabilities, but none have a published fix version yet. Passing.")
          sys.exit(0)
          PY
