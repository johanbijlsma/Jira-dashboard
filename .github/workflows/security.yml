name: Security

on:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  secrets-scan:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run gitleaks (working tree)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false
          GITLEAKS_COMMAND: dir
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_SOURCE: .
          GITLEAKS_REDACT: true

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: python -m pip install --upgrade pip semgrep

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config auto \
            --config p/owasp-top-ten \
            --exclude dashboard/coverage \
            --exclude dashboard/.next \
            --exclude dashboard/node_modules \
            --exclude dashboard/test-results \
            --json \
            --output semgrep-results.json \
            . || true

      - name: Fail on high severity findings
        run: |
          python - <<'PY'
          import json
          import sys

          with open("semgrep-results.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          results = data.get("results", [])
          if not results:
              print("No Semgrep findings.")
              sys.exit(0)

          high_levels = {"HIGH", "CRITICAL", "ERROR"}
          severities = []
          for item in results:
              extra = item.get("extra", {}) if isinstance(item, dict) else {}
              severity = str(extra.get("severity", "")).upper()
              if severity:
                  severities.append(severity)

          if severities:
              high = [s for s in severities if s in high_levels]
              if high:
                  print(f"Semgrep found {len(results)} findings; {len(high)} high/critical/error findings. Failing.")
                  sys.exit(1)
              print(f"Semgrep found {len(results)} findings; none are high/critical/error. Passing.")
              sys.exit(0)

          print("Semgrep findings do not include severity metadata; failing on any findings.")
          sys.exit(1)
          PY

  dependency-scan:
    name: Dependency scan (Node + Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Clean install Node dependencies
        working-directory: dashboard
        run: npm ci

      - name: Run npm audit
        working-directory: dashboard
        run: npm audit --audit-level=high

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies and pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt pip-audit

      - name: Run pip-audit
        run: pip-audit -r requirements.txt -r requirements-dev.txt --format json --output pip-audit-results.json || true

      - name: Fail on fixable Python vulnerabilities
        run: |
          python - <<'PY'
          import json
          import sys

          with open("pip-audit-results.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          findings = data if isinstance(data, list) else data.get("dependencies", [])
          total_vulns = 0
          fixable_vulns = 0

          for dep in findings:
              for vuln in dep.get("vulns", []):
                  total_vulns += 1
                  if vuln.get("fix_versions"):
                      fixable_vulns += 1

          if total_vulns == 0:
              print("No Python vulnerabilities found by pip-audit.")
              sys.exit(0)

          if fixable_vulns > 0:
              print(f"pip-audit found {total_vulns} vulnerabilities; {fixable_vulns} have available fixes. Failing.")
              sys.exit(1)

          print(f"pip-audit found {total_vulns} vulnerabilities, but none have a published fix version yet. Passing.")
          sys.exit(0)
          PY
